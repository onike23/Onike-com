<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONIKE DESERT RUN</title>
<style>
  body{margin:0;background:#87CEEB;overflow:hidden;font-family:Arial}
  #ui{position:absolute;top:10px;width:100%;text-align:center;z-index:10}
  #score{color:#00ff88;font-size:24px;font-weight:bold;text-shadow:2px 2px #000}
  #speedBtn{position:absolute;bottom:100px;right:30px;padding:20px 30px;
    background:#00ff88;border:none;border-radius:50%;font-size:18px;font-weight:bold;
    box-shadow:0 0 20px #00ff88;z-index:10}
  #menu{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);
    display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:20}
 .btn{padding:15px 40px;margin:10px;background:#00ff88;color:#000;border:none;
    font-size:20px;font-weight:bold;border-radius:10px;cursor:pointer}
  h1{color:#00ff88;font-size:40px}
  p{color:#fff;text-align:center;max-width:400px}
</style>
</head>
<body>

<div id="menu">
  <h1>ONIKE DESERT RUN</h1>
  <p><b>INTRO:</b> The rockets are coming! Ride your bike across the desert.
  Dodge the bombs and reach the LAKE to survive!</p>
  <button class="btn" onclick="startGame()">START</button>
  <button class="btn" onclick="exitGame()">EXIT</button>
</div>

<div id="ui">SCORE: <span id="score">0</span></div>
<button id="speedBtn" ontouchstart="boost=1.5" ontouchend="boost=1">SPEED</button>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gameRunning = false;
let score = 0;
let boost = 1;
let speed = 4;

// PLAYER - BOY ON BIKE - 3D STYLE
let player = {x:100, y:canvas.height-150, w:60, h:80, vy:0, onGround:true};

// ENEMIES - ROCKET BOMBS
let rockets = [];
let clouds = [];
let lake = {x: canvas.width - 200, y: canvas.height-120, w:200, h:120};

// Create clouds
for(let i=0;i<8;i++){
  clouds.push({x:Math.random()*canvas.width,y:Math.random()*200,w:100+Math.random()*100})
}

// Create desert ground
let groundY = canvas.height-100;

function drawPlayer(){
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.ellipse(player.x+30, groundY+5, 30, 8, 0, 0, Math.PI*2);
  ctx.fill();

  // BIKE - 3D
  ctx.fillStyle='#222';
  ctx.beginPath(); // wheels
  ctx.arc(player.x+15, player.y+70, 12, 0, Math.PI*2);
  ctx.arc(player.x+45, player.y+70, 12, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='#444'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(player.x+15,player.y+60); ctx.lineTo(player.x+45,player.y+60); ctx.stroke(); // frame

  // BOY - 3D BLOCK STYLE
  ctx.fillStyle='#00ff88'; // shirt
  ctx.fillRect(player.x+20, player.y+30, 20, 25);
  ctx.fillStyle='#ffdbac'; // skin
  ctx.fillRect(player.x+22, player.y+10, 16, 20); // head
  ctx.fillStyle='#333'; // pants
  ctx.fillRect(player.x+20, player.y+55, 20, 15);
}

function drawRocket(r){
  // ROCKET - 3D RED
  ctx.fillStyle='red';
  ctx.beginPath();
  ctx.moveTo(r.x, r.y); ctx.lineTo(r.x+20, r.y+10); ctx.lineTo(r.x, r.y+20); ctx.closePath(); // tip
  ctx.fill();
  ctx.fillRect(r.x, r.y+5, 15, 10); // body
  ctx.fillStyle='orange'; // fire
  ctx.beginPath(); ctx.moveTo(r.x, r.y+7); ctx.lineTo(r.x-10, r.y+10); ctx.lineTo(r.x, r.y+13); ctx.fill();
}

function drawScene(){
  // SKY - CLOUDY
  ctx.fillStyle='#87CEEB';
  ctx.fillRect(0,0,canvas.width,groundY);

  // CLOUDS
  ctx.fillStyle='white';
  clouds.forEach(c=>{
    ctx.beginPath();
    ctx.arc(c.x,c.y,30,0,Math.PI*2);
    ctx.arc(c.x+40,c.y,40,0,Math.PI*2);
    ctx.arc(c.x+80,c.y,30,0,Math.PI*2);
    ctx.fill();
    c.x -= 1;
    if(c.x < -100) c.x = canvas.width+100;
  });

  // DESERT
  ctx.fillStyle='#DEB887';
  ctx.fillRect(0,groundY,canvas.width,canvas.height-groundY);

  // LAKE - TARGET
  ctx.fillStyle='#00BFFF';
  ctx.fillRect(lake.x,lake.y,lake.w,lake.h);
  ctx.fillStyle='white'; ctx.font='16px Arial';
  ctx.fillText('LAKE - SAFE ZONE', lake.x+30, lake.y+60);
}

function spawnRocket(){
  rockets.push({
    x: canvas.width + Math.random()*200,
    y: Math.random()*(groundY-100),
    speed: 6 + Math.random()*2
  });
}

function update(){
  if(!gameRunning) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawScene();

  // MOVE PLAYER
  player.x += speed * boost;

  // DRAW PLAYER
  drawPlayer();

  // ROCKETS
  rockets.forEach((r,i)=>{
    r.x -= r.speed;
    drawRocket(r);

    // Hit player
    if(r.x < player.x+60 && r.x+20 > player.x &&
       r.y < player.y+80 && r.y+20 > player.y){
      gameOver("BOOM! Rocket hit you!");
    }

    // Remove off screen
    if(r.x < -50) rockets.splice(i,1);
  });

  // WIN CONDITION - REACH WATER
  if(player.x > lake.x){
    gameOver("YOU MADE IT TO THE LAKE! Score: " + score);
  }

  // SCORE
  score += boost;
  document.getElementById('score').innerText = Math.floor(score);

  requestAnimationFrame(update);
}

function gameOver(msg){
  gameRunning = false;
  alert(msg);
  document.getElementById('menu').style.display='flex';
  player.x = 100; score = 0; rockets = [];
}

function startGame(){
  document.getElementById('menu').style.display='none';
  gameRunning = true;
  setInterval(spawnRocket, 1200);
  update();
}

function exitGame(){
  window.location.href = 'index.html';
}

// MOBILE CONTROLS
document.addEventListener('touchstart', e=>{
  if(e.touches[0].clientX < canvas.width/2) speed = -4; // left
  else speed = 4; // right
});
document.addEventListener('touchend', ()=>{speed = 4 * boost});

window.addEventListener('resize', ()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});
</script>
</body>
</html>
