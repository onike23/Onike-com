<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONIKE PENALTY</title>
<style>
body{margin:0;background:#000;font-family:Arial;overflow:hidden}
canvas{display:block;margin:auto;background:#2a7d32}
.hud{position:absolute;top:10px;width:100%;text-align:center;color:white;font-size:24px;font-weight:bold;text-shadow:2px 2px 4px #000}
.btns{position:absolute;bottom:20px;width:100%;display:flex;justify-content:space-around}
.btn{width:30%;padding:20px;font-size:18px;font-weight:bold;border:none;border-radius:15px;background:#00ff88;color:#000}
</style>
</head>
<body>
<div class="hud">GOALS: <span id="score">0</span> | MISSES: <span id="miss">0</span></div>
<canvas id="game" width="400" height="700"></canvas>
<div class="btns">
<button class="btn" onclick="shoot('left')">← LEFT</button>
<button class="btn" onclick="shoot('middle')">CENTER</button>
<button class="btn" onclick="shoot('right')">RIGHT →</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
let score=0,misses=0;
let ball={x:200,y:550,r:12,shooting:false};
let keeper={x:200,y:90,diving:''};

function drawAll(){
ctx.clearRect(0,0,400,700);
// SKY + FANS
ctx.fillStyle='#1a4d8f';ctx.fillRect(0,0,400,120);
ctx.fillStyle='#ff0000';for(let i=0;i<100;i++)ctx.fillRect(Math.random()*400,20+Math.random()*60,3,3);
ctx.fillStyle='#00ff88';for(let i=0;i<100;i++)ctx.fillRect(Math.random()*400,20+Math.random()*60,3,3);
// PITCH
ctx.fillStyle='#2a7d32';ctx.fillRect(0,120,400,580);
ctx.strokeStyle='white';ctx.lineWidth=3;ctx.strokeRect(60,130,280,220);
// GOAL
ctx.strokeStyle='white';ctx.lineWidth=4;ctx.strokeRect(120,130,160,80);
// KEEPER
ctx.fillStyle='rgba(0,0,0,0.3)';ctx.ellipse(keeper.x,keeper.y+75,25,6,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#000';ctx.fillRect(keeper.x-15,keeper.y+45,10,25);ctx.fillRect(keeper.x+5,keeper.y+45,10,25);
ctx.fillStyle='#ff0033';ctx.fillRect(keeper.x-18,keeper.y+20,36,30);
ctx.fillStyle='#ffdbac';ctx.beginPath();ctx.arc(keeper.x,keeper.y+10,11,0,Math.PI*2);ctx.fill();
// PLAYER
ctx.fillStyle='rgba(0,0,0,0.3)';ctx.ellipse(200,560,20,5,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#000';ctx.fillRect(190,540,8,25);ctx.fillRect(202,540,8,25);
ctx.fillStyle='#00ff88';ctx.fillRect(188,520,24,25);
ctx.fillStyle='#ffdbac';ctx.beginPath();ctx.arc(200,510,10,0,Math.PI*2);ctx.fill();
// BALL
ctx.fillStyle='white';ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
requestAnimationFrame(drawAll);
}
drawAll();

function shoot(direction){
if(ball.shooting)return;
ball.shooting=true;
keeper.diving=Math.random()>0.5?direction:['left','middle','right'][Math.floor(Math.random()*3)];
let targetX=direction=='left'?150:direction=='right'?250:200;
let speed=18;
let iv=setInterval(()=>{
ball.y-=speed;ball.x+=(targetX-ball.x)*0.15;
if(ball.y<140){
clearInterval(iv);
if(Math.abs(ball.x-keeper.x)<35&&keeper.diving==direction){misses++}else{score++}
document.getElementById('score').innerText=score;
document.getElementById('miss').innerText=misses;
setTimeout(()=>{ball={x:200,y:550,r:12,shooting:false};keeper.diving=''},1200)
}
},16)
}
</script>
</body>
</html>
